<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অ্যাডমিন প্যানেল</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#0b1220; color:#e7edf5; margin:0; padding:0 0 40px;
  }
  header {
    display:flex; align-items:center; justify-content:space-between;
    background:#111a2b; padding:14px 18px; border-bottom:1px solid #1e2a40;
    position:sticky; top:0; z-index:10;
  }
  .brand { display:flex; align-items:center; gap:10px; font-size:19px; font-weight:700; }
  .brand .icon { font-size:26px; }
  .badge-admin { background:#2f6bff; color:#fff; font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; margin-left:8px; }
  .btn-logout { background:transparent; border:1px solid #2c3a52; color:#cdd8ea; padding:8px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .btn-logout:hover { background:#182238; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }

  .banner {
    display:flex; gap:12px; align-items:flex-start;
    background:#0e2a1c; border:1px solid #1c4a30; border-radius:14px; padding:16px; margin-bottom:18px;
  }
  .banner.warn { background:#2a220e; border-color:#4a3d1c; }
  .banner .chk { font-size:20px; }
  .banner h3 { margin:0 0 4px; font-size:15px; color:#3ddc84; }
  .banner.warn h3 { color:#ffcf4d; }
  .banner p { margin:0; font-size:13px; color:#a9b6c8; line-height:1.5; }

  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
  .stat-card {
    background:#111a2b; border:1px solid #1e2a40; border-radius:14px; padding:16px;
  }
  .stat-card .label { font-size:13px; color:#9fb0c8; display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .stat-card .value { font-size:26px; font-weight:700; color:#3ddc84; margin-bottom:6px; }
  .bar-bg { background:#1c2740; border-radius:6px; height:6px; overflow:hidden; margin-bottom:6px; }
  .bar-fill { background:#3ddc84; height:100%; border-radius:6px; }
  .stat-card .meta { font-size:11.5px; color:#7c8aa3; }

  .section-title { font-size:17px; font-weight:700; margin:26px 0 12px; }

  .userstat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px; }
  .userstat-card { background:#111a2b; border:1px solid #1e2a40; border-radius:14px; padding:16px; }
  .userstat-card .num { font-size:28px; font-weight:800; margin-bottom:4px; }
  .userstat-card .lbl { font-size:13px; color:#9fb0c8; }
  .num.blue{color:#5b8dff;} .num.orange{color:#ffb648;} .num.green{color:#3ddc84;} .num.red{color:#ff5c5c;}

  .panel {
    background:#111a2b; border:1px solid #1e2a40; border-radius:16px; padding:16px; margin-bottom:16px;
  }
  .panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .panel-head h2 { font-size:16px; margin:0; display:flex; align-items:center; gap:8px; }
  .btn-refresh { background:#2f6bff; border:none; color:#fff; padding:9px 14px; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .btn-refresh:hover { background:#1f57e0; }
  .btn-refresh:disabled { opacity:.6; cursor:not-allowed; }

  .user-row {
    display:flex; align-items:center; gap:12px; padding:14px 4px; border-bottom:1px solid #1b263b;
  }
  .user-row:last-child { border-bottom:none; }
  .avatar {
    width:42px; height:42px; min-width:42px; border-radius:50%; background:#4d7bff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:17px; color:#fff;
  }
  .u-main { flex:1; min-width:0; }
  .u-name { font-weight:700; font-size:15px; margin-bottom:2px; }
  .u-phone { font-size:13px; color:#8b98ae; margin-bottom:4px; }
  .u-line2 { display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:12.5px; }
  .pin { color:#b18cff; font-weight:600; }
  .tag { padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:700; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
  .tag.warn { background:#3a2412; color:#ffb648; }
  .tag.premium { background:#3a2b06; color:#ffcc55; }
  .u-right { text-align:right; font-size:11.5px; color:#8b98ae; display:flex; flex-direction:column; align-items:flex-end; gap:8px; min-width:78px; }
  .btn-del {
    background:transparent; border:1px solid #4a2020; color:#ff6b6b; width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:14px;
  }
  .btn-del:hover { background:#241012; }
  .empty, .loading { text-align:center; color:#7c8aa3; padding:30px 10px; font-size:13px; }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="icon">📓</span> অ্যাডমিন প্যানেল <span class="badge-admin">ADMIN</span></div>
  <div style="display:flex; gap:8px;">
    <a href="school-admin.html" style="text-decoration:none; background:transparent; border:1px solid #2c3a52; color:#cdd8ea; padding:8px 14px; border-radius:8px; font-size:13px;">🏫 স্কুল ম্যানেজমেন্ট</a>
    <button class="btn-logout" onclick="logout()">লগআউট</button>
  </div>
</header>


<div class="wrap">

  <div id="banner" class="banner">
    <div class="chk">✅</div>
    <div>
      <h3 id="banner-title">লোড হচ্ছে...</h3>
      <p id="banner-sub"></p>
    </div>
  </div>

  <div class="grid2">
    <div class="stat-card">
      <div class="label">📖 Read</div>
      <div class="value" id="q-read">0</div>
      <div class="bar-bg"><div class="bar-fill" id="q-read-bar" style="width:0%"></div></div>
      <div class="meta" id="q-read-meta">0% · লিমিট: ৫০,০০০</div>
    </div>
    <div class="stat-card">
      <div class="label">✏️ Write</div>
      <div class="value" id="q-write">0</div>
      <div class="bar-bg"><div class="bar-fill" id="q-write-bar" style="width:0%"></div></div>
      <div class="meta" id="q-write-meta">0% · লিমিট: ২০,০০০</div>
    </div>
    <div class="stat-card">
      <div class="label">💾 Storage</div>
      <div class="value" id="q-storage">0 MB</div>
      <div class="bar-bg"><div class="bar-fill" id="q-storage-bar" style="width:0%"></div></div>
      <div class="meta" id="q-storage-meta">0% · লিমিট: ১ GB</div>
    </div>
    <div class="stat-card">
      <div class="label">🗑️ Delete</div>
      <div class="value" id="q-delete">0</div>
      <div class="bar-bg"><div class="bar-fill" id="q-delete-bar" style="width:0%"></div></div>
      <div class="meta" id="q-delete-meta">0% · লিমিট: ২০,০০০</div>
    </div>
  </div>

  <div class="section-title">👥 ইউজার পরিসংখ্যান</div>
  <div class="userstat-grid">
    <div class="userstat-card"><div class="num blue" id="s-total">0</div><div class="lbl">মোট ইউজার</div></div>
    <div class="userstat-card"><div class="num orange" id="s-premium">0</div><div class="lbl">প্রিমিয়াম</div></div>
    <div class="userstat-card"><div class="num green" id="s-trial">0</div><div class="lbl">ফ্রি ট্রায়াল</div></div>
    <div class="userstat-card"><div class="num red" id="s-expired">0</div><div class="lbl">মেয়াদ শেষ</div></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>📋 সাম্প্রতিক ইউজার</h2>
      <button class="btn-refresh" id="refresh-btn" onclick="loadUsers()">🔄 রিফ্রেশ</button>
    </div>
    <div id="user-list"><div class="loading">লোড হচ্ছে...</div></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ এটা আপনার আসল Firebase প্রজেক্ট। ভিন্ন প্রজেক্ট হলে এই কনফিগ বদলে দিন।
  const firebaseConfig = {
    apiKey: "AIzaSyD0X7uf_JVVSnMrBj24B8Oeke9fcMrIsLE",
    authDomain: "school-erp-bd.firebaseapp.com",
    projectId: "school-erp-bd",
    storageBucket: "school-erp-bd.firebasestorage.app",
    messagingSenderId: "951924242207",
    appId: "1:951924242207:web:c5bd862a9e00ae9d9b622a",
    measurementId: "G-9E9LHG9HWS"
  };

  // ⚠️ ইউজারদের কালেকশনের নাম — আপনার ডাটাবেজ অনুযায়ী বদলে নিন
  const USERS_COLLECTION = "users";
  // ফ্রি প্ল্যানের মূল লিমিট (রেফারেন্স স্ক্রিনশট অনুযায়ী)
  const LIMITS = { read: 50000, write: 20000, storageMB: 1024, del: 20000 };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.logout = function () { signOut(auth).then(() => location.reload()); };

  function fmtDate(v) {
    if (!v) return "—";
    let d;
    if (v.toDate) d = v.toDate();
    else d = new Date(v);
    if (isNaN(d)) return "—";
    return d.toLocaleDateString('bn-BD', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  function initials(name) {
    if (!name || name === "—") return "-";
    return name.trim().charAt(0).toUpperCase();
  }

  function statusOf(u) {
    // priority: premium flag > expiry date compare > default trial/no-data
    const now = new Date();
    let expiry = null;
    if (u.expiryDate) expiry = u.expiryDate.toDate ? u.expiryDate.toDate() : new Date(u.expiryDate);

    if (u.plan === 'premium' || u.isPremium) {
      return { type: 'premium' };
    }
    if (expiry && expiry < now) {
      return { type: 'expired' };
    }
    if (expiry) {
      return { type: 'trial' };
    }
    return { type: 'no-data' };
  }

  window.deleteUser = async function (id, name) {
    if (!confirm(`"${name}" ইউজারকে মুছে ফেলতে চান? এই কাজ ফেরানো যাবে না।`)) return;
    try {
      await deleteDoc(doc(db, USERS_COLLECTION, id));
      loadUsers();
    } catch (e) {
      alert("মুছতে সমস্যা হয়েছে: " + e.message);
    }
  };

  function setQuota(totalUsers) {
    // প্রকৃত Firebase ব্যবহার Cloud Monitoring API ছাড়া ক্লায়েন্ট থেকে পড়া যায় না,
    // তাই এটা ইউজার-সংখ্যার ভিত্তিতে একটা যুক্তিসঙ্গত আনুমানিক হিসাব।
    const reads = totalUsers * 30;
    const writes = totalUsers * 10;
    const deletes = totalUsers;
    const storageMB = +(totalUsers * 0.0045).toFixed(2);

    const setCard = (key, value, limit, unit) => {
      const pct = Math.min(100, (value / limit) * 100);
      document.getElementById(`q-${key}`).textContent = unit ? `${value} ${unit}` : value.toLocaleString('bn-BD');
      document.getElementById(`q-${key}-bar`).style.width = pct.toFixed(1) + '%';
      document.getElementById(`q-${key}-meta`).textContent =
        `${pct.toFixed(1)}% · লিমিট: ${limit.toLocaleString('bn-BD')}${unit ? ' ' + unit : ''}`;
    };
    setCard('read', reads, LIMITS.read);
    setCard('write', writes, LIMITS.write);
    setCard('delete', deletes, LIMITS.del);

    document.getElementById('q-storage').textContent = storageMB + ' MB';
    const spct = Math.min(100, (storageMB / LIMITS.storageMB) * 100);
    document.getElementById('q-storage-bar').style.width = spct.toFixed(1) + '%';
    document.getElementById('q-storage-meta').textContent = `${spct.toFixed(1)}% · লিমিট: ১ GB`;

    const overallPct = Math.max(reads/LIMITS.read, writes/LIMITS.write, deletes/LIMITS.del) * 100;
    const banner = document.getElementById('banner');
    if (overallPct < 80) {
      banner.classList.remove('warn');
      document.getElementById('banner-title').textContent = 'সব ঠিক আছে — ফ্রি প্ল্যানে চলছে';
    } else {
      banner.classList.add('warn');
      document.getElementById('banner-title').textContent = 'কোটা প্রায় শেষ — আপগ্রেড বিবেচনা করুন';
    }
    const remaining = Math.max(0, Math.floor((LIMITS.write - writes) / 10));
    document.getElementById('banner-sub').textContent =
      `বর্তমানে ${totalUsers} জন ইউজার, কোটার ${overallPct.toFixed(0)}% ব্যবহার হচ্ছে। আরো ~${remaining} জন ইউজার ফ্রিতে নিতে পারবেন।`;
  }

  window.loadUsers = async function () {
    const btn = document.getElementById('refresh-btn');
    const listEl = document.getElementById('user-list');
    btn.disabled = true;
    listEl.innerHTML = '<div class="loading">লোড হচ্ছে...</div>';
    try {
      const snap = await getDocs(collection(db, USERS_COLLECTION));
      const users = [];
      snap.forEach(d => users.push({ id: d.id, ...d.data() }));

      // stats
      let premium = 0, trial = 0, expired = 0;
      users.forEach(u => {
        const s = statusOf(u);
        if (s.type === 'premium') premium++;
        else if (s.type === 'expired') expired++;
        else trial++;
      });
      document.getElementById('s-total').textContent = users.length;
      document.getElementById('s-premium').textContent = premium;
      document.getElementById('s-trial').textContent = trial;
      document.getElementById('s-expired').textContent = expired;
      setQuota(users.length);

      if (users.length === 0) {
        listEl.innerHTML = '<div class="empty">কোনো ইউজার পাওয়া যায়নি</div>';
        return;
      }

      // most recent first if createdAt exists
      users.sort((a, b) => {
        const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
        const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
        return tb - ta;
      });

      listEl.innerHTML = users.map(u => {
        const s = statusOf(u);
        const name = u.name || '—';
        const phone = u.phone || '—';
        const pin = u.pin || u.password || 'N/A';
        const pinDisplay = (u.passwordHashed) ? '••• <span style="color:#8b98ae">(হ্যাশড)</span>' : `<span class="pin">${pin}</span>`;
        let tag = '';
        if (s.type === 'premium') tag = `<span class="tag premium">⭐ প্রিমিয়াম</span>`;
        else if (s.type === 'expired') tag = `<span class="tag warn">⚠️ মেয়াদ শেষ</span>`;
        else tag = `<span class="tag warn">⚠️ No Data Use</span>`;

        return `
          <div class="user-row">
            <div class="avatar">${initials(name)}</div>
            <div class="u-main">
              <div class="u-name">${name}</div>
              <div class="u-phone">${phone}</div>
              <div class="u-line2">🔑 ${pinDisplay} ${tag}</div>
            </div>
            <div class="u-right">
              <div>মেয়াদ:<br>${fmtDate(u.expiryDate)}</div>
              <button class="btn-del" onclick="deleteUser('${u.id}', '${name.replace(/'/g, "\\'")}')">🗑️</button>
            </div>
          </div>`;
      }).join('');

    } catch (e) {
      listEl.innerHTML = `<div class="empty">ডেটা লোড করতে সমস্যা হয়েছে: ${e.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  };

  onAuthStateChanged(auth, () => { loadUsers(); });
  // লগইন ছাড়াই দেখতে চাইলে (উদাহরণ/ডেমো), সরাসরি লোড করুন:
  loadUsers();
</script>
</body>
</html>
